name: Docker

on:
    push:
        tags:
            - "vanilla-*"
            - "tshock-*"
    workflow_dispatch:
        inputs:
            image:
                description: "Which image to build"
                required: true
                type: choice
                options:
                    - vanilla
                    - tshock
            vanilla_version:
                description: "Terraria version (e.g. 1.4.4.9) — required when image is vanilla"
                required: false
            vanilla_seq:
                description: "Build sequence number for vanilla (default: 1)"
                required: false
                default: "1"
            tshock_version:
                description: "TShock version (e.g. 5.2.3) — required when image is tshock"
                required: false
            terraria_version:
                description: "Terraria version targeted by TShock (e.g. 1.4.4.9) — required when image is tshock"
                required: false
            tshock_seq:
                description: "Build sequence number for tshock (default: 1)"
                required: false
                default: "1"

permissions:
    contents: write
    packages: write

jobs:
    vanilla:
        name: Build vanilla
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/vanilla-') || (github.event_name == 'workflow_dispatch' && inputs.image == 'vanilla')

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Parse version from tag or input
              id: version
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    DOTTED="${{ inputs.vanilla_version }}"
                    SEQ="${{ inputs.vanilla_seq }}"
                  else
                    # tag is vanilla-1.4.4.9 or vanilla-1.4.4.9-2 → strip prefix
                    STRIPPED="${GITHUB_REF_NAME#vanilla-}"
                    # check if last segment is a plain integer (sequence number)
                    LAST="${STRIPPED##*-}"
                    if [[ "$LAST" =~ ^[0-9]+$ ]] && [[ "$STRIPPED" == *-* ]]; then
                      DOTTED="${STRIPPED%-*}"
                      SEQ="$LAST"
                    else
                      DOTTED="$STRIPPED"
                      SEQ=1
                    fi
                  fi
                  # 1.4.4.9 → 1449 (strip all dots)
                  DL_VERSION="${DOTTED//./}"
                  echo "dotted=$DOTTED" >> "$GITHUB_OUTPUT"
                  echo "dl_version=$DL_VERSION" >> "$GITHUB_OUTPUT"
                  echo "seq=$SEQ" >> "$GITHUB_OUTPUT"

            - name: Update ARG defaults in Dockerfile
              run: |
                  sed -i "s/^ARG DL_VERSION=.*/ARG DL_VERSION=${{ steps.version.outputs.dl_version }}/" vanilla/Dockerfile

            - name: Commit updated Dockerfile
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
                  git add vanilla/Dockerfile
                  git diff --cached --quiet || git commit -m "chore(vanilla): bump version to ${{ steps.version.outputs.dotted }}"
                  git pull --rebase origin main
                  git push origin HEAD:main

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push vanilla
              uses: docker/build-push-action@v6
              with:
                  context: ./vanilla
                  file: ./vanilla/Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  build-args: |
                      DL_VERSION=${{ steps.version.outputs.dl_version }}
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/terraria/vanilla:latest
                      ghcr.io/${{ github.repository_owner }}/terraria/vanilla:${{ steps.version.outputs.dotted }}
                      ghcr.io/${{ github.repository_owner }}/terraria/vanilla:${{ steps.version.outputs.dotted }}-${{ steps.version.outputs.seq }}
                  cache-from: type=gha,scope=vanilla
                  cache-to: type=gha,scope=vanilla,mode=max

    tshock:
        name: Build tshock
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/tshock-') || (github.event_name == 'workflow_dispatch' && inputs.image == 'tshock')

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Parse versions from tag or input
              id: version
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    TERRARIA="${{ inputs.terraria_version }}"
                    TSHOCK="${{ inputs.tshock_version }}"
                    SEQ="${{ inputs.tshock_seq }}"
                  else
                    # tag is tshock-1.4.4.9-5.2.3 or tshock-1.4.4.9-5.2.3-2 → strip prefix
                    COMBINED="${GITHUB_REF_NAME#tshock-}"
                    # check if last segment is a plain integer (sequence number)
                    LAST="${COMBINED##*-}"
                    if [[ "$LAST" =~ ^[0-9]+$ ]]; then
                      COMBINED="${COMBINED%-*}"
                      SEQ="$LAST"
                    else
                      SEQ=1
                    fi
                    # COMBINED = 1.4.4.9-5.2.3; terraria version has 3 dots, tshock has 2
                    TERRARIA="${COMBINED%-*}"
                    TSHOCK="${COMBINED##*-}"
                  fi
                  echo "terraria=$TERRARIA" >> "$GITHUB_OUTPUT"
                  echo "tshock=$TSHOCK" >> "$GITHUB_OUTPUT"
                  echo "combined=${TERRARIA}-${TSHOCK}" >> "$GITHUB_OUTPUT"
                  echo "seq=$SEQ" >> "$GITHUB_OUTPUT"

            - name: Update ARG defaults in Dockerfile
              run: |
                  sed -i "s/^ARG TSHOCK_VERSION=.*/ARG TSHOCK_VERSION=${{ steps.version.outputs.tshock }}/" tshock/Dockerfile
                  sed -i "s/^ARG TERRARIA_VERSION=.*/ARG TERRARIA_VERSION=${{ steps.version.outputs.terraria }}/" tshock/Dockerfile

            - name: Commit updated Dockerfile
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
                  git add tshock/Dockerfile
                  git diff --cached --quiet || git commit -m "chore(tshock): bump version to ${{ steps.version.outputs.combined }}"
                  git pull --rebase origin main
                  git push origin HEAD:main

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push tshock
              uses: docker/build-push-action@v6
              with:
                  context: ./tshock
                  file: ./tshock/Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  build-args: |
                      TSHOCK_VERSION=${{ steps.version.outputs.tshock }}
                      TERRARIA_VERSION=${{ steps.version.outputs.terraria }}
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/terraria/tshock:latest
                      ghcr.io/${{ github.repository_owner }}/terraria/tshock:${{ steps.version.outputs.tshock }}
                      ghcr.io/${{ github.repository_owner }}/terraria/tshock:${{ steps.version.outputs.combined }}
                      ghcr.io/${{ github.repository_owner }}/terraria/tshock:${{ steps.version.outputs.combined }}-${{ steps.version.outputs.seq }}
                  cache-from: type=gha,scope=tshock
                  cache-to: type=gha,scope=tshock,mode=max
